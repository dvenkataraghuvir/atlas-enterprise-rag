<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atlas — Enterprise RAG Assistant</title>
<link rel="stylesheet" href="assets/ds.css" />
<style>
  :root { --accent: var(--blue); --accent-t: var(--blue-t); --accent-t2: var(--blue-t2); }

  /* ---------- product layout ---------- */
  .app { flex: 1; display: grid; grid-template-columns: 248px 1fr 348px; overflow: hidden; }
  .pane { overflow-y: auto; min-height: 0; }

  /* left rail */
  .rail { background: var(--surface); border-right: 1px solid var(--border); padding: 18px 14px; }
  .rail-h { font-family: var(--mono); font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-4); padding: 0 8px; margin: 18px 0 9px; }
  .rail-h:first-child { margin-top: 0; }
  .src { display:flex; align-items:center; gap:10px; padding: 8px; border-radius: var(--r-sm); cursor:pointer; transition: background .12s; }
  .src:hover { background: var(--surface-2); }
  .src .ic { width: 22px; height:22px; border-radius:6px; display:grid; place-items:center; font-size:11px; font-weight:700; color:#fff; flex:none; }
  .src .nm { font-size: 13px; font-weight: 600; }
  .src .ct { margin-left:auto; font-family:var(--mono); font-size:10.5px; color:var(--ink-4); }
  .recent { padding: 7px 8px; border-radius: var(--r-sm); cursor:pointer; font-size:12.5px; color:var(--ink-2); line-height:1.4; }
  .recent:hover { background: var(--surface-2); color: var(--ink); }

  /* center conversation */
  .conv { display:flex; flex-direction:column; }
  .conv-scroll { flex:1; overflow-y:auto; padding: 28px 40px 8px; }
  .empty { max-width: 600px; margin: 40px auto 0; text-align:center; }
  .empty h2 { font-size: 26px; letter-spacing:-0.02em; font-weight:800; }
  .empty p { color: var(--ink-2); font-size:14.5px; margin-top:10px; line-height:1.55; }
  .suggest { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:28px; text-align:left; }
  .suggest button {
    font-family:var(--sans); background:var(--surface); border:1px solid var(--border); border-radius:var(--r);
    padding:14px 15px; text-align:left; cursor:pointer; transition:all .15s; font-size:13.5px; font-weight:600; color:var(--ink);
    box-shadow:var(--sh-sm);
  }
  .suggest button:hover { border-color:var(--accent); background:var(--accent-t); }
  .suggest button span { display:block; font-weight:500; color:var(--ink-3); font-size:11.5px; margin-top:5px; font-family:var(--mono); }

  .msg { max-width: 760px; margin: 0 auto 26px; }
  .msg.user { display:flex; justify-content:flex-end; }
  .msg.user .bubble { background:var(--ink); color:#fff; padding:11px 16px; border-radius:14px 14px 4px 14px; font-size:14.5px; font-weight:500; max-width:80%; }
  .answer-head { display:flex; align-items:center; gap:9px; margin-bottom:12px; }
  .answer-head .brand-mark { width:24px; height:24px; font-size:13px; border-radius:7px; }
  .answer-head .nm { font-weight:700; font-size:13.5px; }
  .answer-head .status { font-family:var(--mono); font-size:11px; color:var(--ink-3); margin-left:auto; display:flex; align-items:center; gap:6px; }
  .answer-body { font-size:15px; line-height:1.68; color:var(--ink); }
  .answer-body p { margin-bottom: 13px; }
  .answer-body strong { font-weight: 700; }
  .cite {
    display:inline-flex; align-items:center; justify-content:center; min-width:16px; height:16px; padding:0 4px;
    background:var(--accent-t); color:var(--accent); border-radius:5px; font-family:var(--mono); font-size:10px; font-weight:600;
    vertical-align: super; margin: 0 1px; cursor:pointer; transition: all .12s; line-height:1; transform: translateY(-2px);
  }
  .cite:hover, .cite.hot { background:var(--accent); color:#fff; }
  .answer-actions { display:flex; gap:6px; margin-top:16px; align-items:center; }
  .ico-btn { width:30px; height:30px; border-radius:7px; border:1px solid var(--border); background:var(--surface); cursor:pointer; display:grid; place-items:center; color:var(--ink-3); transition:all .12s; font-size:13px;}
  .ico-btn:hover { color:var(--ink); border-color:var(--ink-3); }

  /* composer */
  .composer { flex:none; padding: 14px 40px 22px; background: linear-gradient(to top, var(--bg) 60%, transparent); }
  .composer-inner { max-width:760px; margin:0 auto; background:var(--surface); border:1px solid var(--border-2); border-radius:var(--r-lg); box-shadow:var(--sh-md); padding:6px 6px 6px 16px; display:flex; align-items:center; gap:10px; }
  .composer-inner:focus-within { border-color:var(--accent); }
  .composer-inner input { flex:1; border:none; outline:none; font-family:var(--sans); font-size:14.5px; background:transparent; color:var(--ink); padding:10px 0; }
  .composer-inner input::placeholder { color:var(--ink-4); }
  .send { width:38px; height:38px; border-radius:9px; border:none; background:var(--accent); color:#fff; cursor:pointer; display:grid; place-items:center; flex:none; transition:.12s; }
  .send:hover { filter:brightness(1.05); }
  .send:disabled { background:var(--surface-3); color:var(--ink-4); cursor:default; }

  /* right inspector */
  .insp { background:var(--surface); border-left:1px solid var(--border); padding: 18px 16px; }
  .insp-h { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  .insp-h .t { font-weight:700; font-size:14px; }
  .insp-sub { color:var(--ink-3); font-size:11.5px; margin-bottom:16px; line-height:1.4; }

  .pipe-step { display:flex; gap:11px; padding-bottom:14px; position:relative; }
  .pipe-step:not(:last-child)::before { content:''; position:absolute; left:9px; top:22px; bottom:0; width:1.5px; background:var(--border); }
  .pipe-dot { width:19px; height:19px; border-radius:50%; background:var(--accent-t); border:1.5px solid var(--accent); flex:none; display:grid; place-items:center; z-index:1; }
  .pipe-dot.done { background:var(--accent); }
  .pipe-step .pt { font-size:12.5px; font-weight:700; }
  .pipe-step .pd { font-size:11px; color:var(--ink-3); margin-top:2px; font-family:var(--mono); }

  .ground { margin: 6px 0 18px; padding:14px; background:var(--accent-t); border-radius:var(--r); }
  .ground .gt { font-size:11.5px; font-weight:700; color:var(--accent); display:flex; justify-content:space-between; }
  .ground .bar { height:7px; background:#fff; border-radius:99px; margin-top:9px; overflow:hidden; }
  .ground .bar i { display:block; height:100%; background:var(--accent); border-radius:99px; }
  .ground .gn { font-size:10.5px; color:var(--ink-2); margin-top:8px; line-height:1.45; }

  .chunk { border:1px solid var(--border); border-radius:var(--r); padding:12px; margin-bottom:10px; transition:all .15s; cursor:default; }
  .chunk.hot { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-t); }
  .chunk-h { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
  .chunk-h .n { width:17px;height:17px;border-radius:5px;background:var(--accent);color:#fff;font-family:var(--mono);font-size:10px;font-weight:600;display:grid;place-items:center; flex:none;}
  .chunk-h .ti { font-size:12px; font-weight:700; line-height:1.2; }
  .chunk-h .sc { margin-left:auto; font-family:var(--mono); font-size:10px; color:var(--ink-3); text-align:right; flex:none;}
  .chunk-x { font-size:11.5px; color:var(--ink-2); line-height:1.5; }
  .chunk-meta { display:flex; gap:5px; margin-top:8px; }

  /* ---------- architecture view ---------- */
  .arch-wrap { flex:1; overflow:auto; }
  .arch-inner { padding: 34px 40px 60px; min-width: 1000px; }
  .arch-title { font-size:21px; font-weight:800; letter-spacing:-0.02em; }
  .arch-desc { color:var(--ink-2); font-size:14px; margin-top:7px; max-width:70ch; line-height:1.55; }
  .lane { margin-top: 26px; }
  .lane-label { font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-4); margin-bottom:12px; display:flex; align-items:center; gap:10px;}
  .lane-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .flow { display:flex; align-items:stretch; gap:0; flex-wrap:nowrap; }
  .flow .node { flex:1; min-width:0; }
  .arrow { flex:none; width:42px; display:grid; place-items:center; color:var(--ink-4); }
  .arrow svg { width:100%; }
  .node.accent { border-color:var(--accent); background:var(--accent-t); }
  .node.ghost { background:var(--surface-2); border-style:dashed; }
  .legend { display:flex; gap:18px; margin-top:30px; flex-wrap:wrap; padding-top:18px; border-top:1px solid var(--border); }
  .legend div { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--ink-2); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
// @ts-nocheck
const { useState, useEffect, useRef } = React;

/* ---------------- data ---------------- */
const SOURCES = [
  { ic:'C', col:'oklch(0.55 0.12 256)', nm:'Confluence', ct:'4,210' },
  { ic:'D', col:'oklch(0.6 0.13 145)',  nm:'Google Drive', ct:'9,884' },
  { ic:'J', col:'oklch(0.6 0.13 256)',  nm:'Jira', ct:'2,107' },
  { ic:'S', col:'oklch(0.62 0.16 25)',  nm:'Slack #eng', ct:'18k' },
  { ic:'P', col:'oklch(0.5 0.02 60)',   nm:'Policy PDFs', ct:'342' },
];
const RECENT = [
  'How do we handle on-call escalation after hours?',
  'What is the SLA for enterprise support tickets?',
  'Which regions is data residency enforced in?',
];

// QA data is now fetched live from the backend (POST /api/chat)
const API_BASE = 'http://localhost:8000';
const SUGGESTIONS = [
  { t:"What's our policy on customer data retention?", s:'policy · legal · privacy' },
  { t:"How do we handle on-call escalation after hours?", s:'sre · incidents' },
  { t:"What is the SLA for enterprise support tickets?", s:'support · sla' },
];

const PIPE = [
  { t:'Query understanding', d:'rewrite + expand' },
  { t:'Hybrid retrieval', d:'BM25 + dense · k=18' },
  { t:'Rerank', d:'cross-encoder · keep 3' },
  { t:'Generate', d:'vLLM · cited' },
  { t:'Source Verification', d:'every claim traced' },
];

/* ---------------- Wikipedia connector component ---------------- */
function WikipediaConnector({ wikiLive, setWikiLive }) {
  const [wikiQuery, setWikiQuery]   = useState('');
  const [wikiState, setWikiState]   = useState('idle');
  const [wikiResult, setWikiResult] = useState(null);
  const [ingested, setIngested]     = useState([]);
  const [expanded, setExpanded]     = useState(false);

  useEffect(() => {
    fetch(API_BASE + '/api/connectors/sources')
      .then(r => r.ok ? r.json() : {})
      .then(data => setIngested(data.wikipedia || []))
      .catch(() => {});
  }, []);

  async function connectWikipedia(e) {
    e.preventDefault();
    if (!wikiQuery.trim()) return;
    setWikiState('loading');
    setWikiResult(null);
    try {
      const res = await fetch(API_BASE + '/api/connectors/wikipedia', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: wikiQuery.trim(), max_articles: 2 }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Failed');
      setWikiResult(data);
      setWikiState('done');
      setIngested(prev => [...new Set([...prev, ...data.titles])]);
      setWikiQuery('');
    } catch (err) {
      setWikiResult({ error: err.message });
      setWikiState('error');
    }
  }

  const SHOW_LIMIT = 4;
  const visibleTopics = expanded ? ingested : ingested.slice(0, SHOW_LIMIT);

  return (
    <div style={{margin:'10px 0'}}>
      <div className="rail-h" style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
        <span>Wikipedia</span>
        {ingested.length > 0 && <span style={{fontSize:9, fontFamily:'var(--mono)', color:'var(--ink-4)'}}>{ingested.length} cached</span>}
      </div>

      {/* Live toggle — prominent row */}
      <div onClick={() => setWikiLive(v => !v)} style={{
        display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:'8px 10px', borderRadius:'var(--r-sm)', cursor:'pointer',
        background: wikiLive ? 'var(--accent-t)' : 'var(--surface-2)',
        border: `1px solid ${wikiLive ? 'var(--accent)' : 'var(--border)'}`,
        marginBottom:8, transition:'all .15s', userSelect:'none'
      }}>
        <div>
          <div style={{fontSize:12, fontWeight:700, color: wikiLive ? 'var(--accent)' : 'var(--ink-2)'}}>
            Live Wikipedia
          </div>
          <div style={{fontSize:10, color:'var(--ink-4)', fontFamily:'var(--mono)', marginTop:1}}>
            {wikiLive ? 'auto-fetches on every query' : 'click to enable'}
          </div>
        </div>
        {/* Toggle pill */}
        <div style={{
          width:36, height:20, borderRadius:10, position:'relative',
          background: wikiLive ? 'var(--accent)' : 'var(--surface-3)',
          transition:'background .2s', flexShrink:0
        }}>
          <div style={{
            position:'absolute', top:3, left: wikiLive ? 19 : 3,
            width:14, height:14, borderRadius:'50%', background:'#fff',
            transition:'left .2s', boxShadow:'0 1px 3px rgba(0,0,0,.2)'
          }}/>
        </div>
      </div>

      {visibleTopics.map((t,i) => (
        <div className="src" key={i} style={{cursor:'default'}}>
          <div className="ic" style={{background:'oklch(0.5 0.08 200)', fontSize:9, fontWeight:700}}>W</div>
          <div className="nm" style={{fontSize:12, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{t}</div>
        </div>
      ))}
      {ingested.length > SHOW_LIMIT && (
        <div onClick={() => setExpanded(e => !e)} style={{
          fontSize:10.5, color:'var(--accent)', cursor:'pointer',
          padding:'2px 8px', fontFamily:'var(--mono)'
        }}>
          {expanded ? '▲ show less' : `+${ingested.length - SHOW_LIMIT} more`}
        </div>
      )}

      <form onSubmit={connectWikipedia} style={{marginTop:8}}>
        <div style={{
          display:'flex', gap:5, background:'var(--surface-2)',
          border:'1px solid var(--border)', borderRadius:'var(--r-sm)',
          padding:'4px 6px', alignItems:'center'
        }}>
          <span style={{fontSize:11, color:'var(--ink-4)'}}>W</span>
          <input
            value={wikiQuery}
            onChange={e => setWikiQuery(e.target.value)}
            placeholder="Cache a topic..."
            style={{flex:1, border:'none', outline:'none', background:'transparent', fontSize:12, color:'var(--ink)', fontFamily:'var(--sans)'}}
            disabled={wikiState === 'loading'}
          />
          <button type="submit" disabled={wikiState === 'loading' || !wikiQuery.trim()} style={{
            border:'none', background: wikiQuery.trim() ? 'var(--accent)' : 'var(--surface-3)',
            color: wikiQuery.trim() ? '#fff' : 'var(--ink-4)',
            borderRadius:5, padding:'2px 8px', fontSize:11, cursor:'pointer', fontWeight:700
          }}>
            {wikiState === 'loading' ? '...' : '+'}
          </button>
        </div>
      </form>

      {wikiState === 'loading' && <div style={{fontSize:10.5, color:'var(--ink-3)', marginTop:5, fontFamily:'var(--mono)'}}>Fetching from Wikipedia...</div>}
      {wikiState === 'done' && wikiResult && <div style={{fontSize:10.5, color:'var(--mint)', marginTop:5, fontFamily:'var(--mono)'}}>✓ {wikiResult.chunks_ingested} chunks cached</div>}
      {wikiState === 'error' && wikiResult && <div style={{fontSize:10.5, color:'var(--rose)', marginTop:5}}>{wikiResult.error}</div>}
    </div>
  );
}

/* ---------------- helpers ---------------- */
function Citations({ text, onHot }) {
  // split text on [n] markers, render bold + citation pills
  const parts = text.split(/(\[\d+\]|\*\*[^*]+\*\*)/g).filter(Boolean);
  return parts.map((p, i) => {
    const m = p.match(/^\[(\d+)\]$/);
    if (m) {
      const n = m[1];
      return <span key={i} className="cite"
        onMouseEnter={()=>onHot(+n)} onMouseLeave={()=>onHot(null)}>{n}</span>;
    }
    const b = p.match(/^\*\*([^*]+)\*\*$/);
    if (b) return <strong key={i}>{b[1]}</strong>;
    return <span key={i}>{p}</span>;
  });
}

/* ---------------- product view ---------------- */
function Product() {
  const [messages,  setMessages]  = useState([]);
  const [hot,       setHot]       = useState(null);
  const [input,     setInput]     = useState('');
  const [wikiLive,  setWikiLive]  = useState(false);
  const scrollRef  = useRef(null);
  const abortRef   = useRef(null);
  const messagesRef = useRef([]);

  useEffect(() => { messagesRef.current = messages; }, [messages]);
  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages]);

  const latestAssistant = [...messages].reverse().find(m => m.role === 'assistant');
  const isStreaming = latestAssistant?.isStreaming ?? false;

  async function ask(query) {
    if (!query.trim() || isStreaming) return;
    if (abortRef.current) abortRef.current.abort();
    abortRef.current = new AbortController();
    setInput('');
    setHot(null);

    // Build history from completed pairs (last 3 turns = 6 messages)
    const prev = messagesRef.current;
    const historyPairs = [];
    for (let i = 0; i + 1 < prev.length; i += 2) {
      const u = prev[i], a = prev[i+1];
      if (u?.role === 'user' && a?.role === 'assistant' && !a.isStreaming && a.text) {
        historyPairs.push({ role: 'user', content: u.text }, { role: 'assistant', content: a.text });
      }
    }
    const history = historyPairs.slice(-6);

    const userMsg = { id: Date.now(), role: 'user', text: query };
    const aid = Date.now() + 1;
    const assistantMsg = { id: aid, role: 'assistant', text: '', sources: [], ground: null,
      latency: null, retrieved: 0, kept: 0, pipeSteps: [], isStreaming: true, error: null };

    setMessages(prev => [...prev, userMsg, assistantMsg]);

    try {
      const res = await fetch(API_BASE + '/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, history, use_wikipedia: wikiLive }),
        signal: abortRef.current.signal,
      });

      if (!res.ok) {
        setMessages(prev => prev.map(m => m.id === aid ? { ...m, isStreaming: false, error: 'Backend error: ' + res.status } : m));
        return;
      }

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let evt;
          try { evt = JSON.parse(line.slice(6)); } catch { continue; }

          if (evt.type === 'pipeline_step') {
            setMessages(prev => prev.map(m => m.id === aid
              ? { ...m, pipeSteps: [...m.pipeSteps, { t: evt.name, d: evt.detail }] } : m));
          } else if (evt.type === 'token') {
            setMessages(prev => prev.map(m => m.id === aid ? { ...m, text: m.text + evt.text } : m));
          } else if (evt.type === 'done') {
            setMessages(prev => prev.map(m => m.id === aid
              ? { ...m, isStreaming: false, sources: evt.sources || [], ground: evt.ground,
                  latency: evt.latency, retrieved: evt.retrieved, kept: evt.kept } : m));
          } else if (evt.type === 'error') {
            setMessages(prev => prev.map(m => m.id === aid ? { ...m, isStreaming: false, error: evt.message } : m));
          }
        }
      }
    } catch (err) {
      if (err.name !== 'AbortError') {
        setMessages(prev => prev.map(m => m.id === aid
          ? { ...m, isStreaming: false, error: 'Could not reach the backend. Make sure the server is running on port 8000.' } : m));
      }
    }
  }

  function submitFree(e) {
    e.preventDefault();
    if (input.trim()) ask(input.trim());
  }

  return (
    <div className="app">
      {/* LEFT */}
      <div className="rail pane">
        <div className="rail-h">Connected sources</div>
        {SOURCES.map(s=>(
          <div className="src" key={s.nm}>
            <div className="ic" style={{background:s.col}}>{s.ic}</div>
            <div className="nm">{s.nm}</div>
            <div className="ct">{s.ct}</div>
          </div>
        ))}

        <WikipediaConnector wikiLive={wikiLive} setWikiLive={setWikiLive} />

        <div className="rail-h">Recent</div>
        {RECENT.map((r,i)=>(
          <div className="recent" key={i} onClick={()=>ask(r)}>{r}</div>
        ))}
        <div style={{marginTop:18, padding:'12px', background:'var(--surface-2)', borderRadius:'var(--r)'}}>
          <div style={{fontSize:11, fontWeight:700, color:'var(--ink-2)'}}>Index</div>
          <div style={{fontFamily:'var(--mono)', fontSize:10.5, color:'var(--ink-3)', marginTop:4}}>
            {latestAssistant?.sources?.length > 0 ? latestAssistant.sources.length + ' sources retrieved' : 'sample docs loaded'}
          </div>
        </div>
      </div>

      {/* CENTER — chat thread */}
      <div className="conv pane" style={{overflow:'hidden'}}>
        <div className="conv-scroll" ref={scrollRef}>
          {messages.length === 0 && (
            <div className="empty fade-in">
              <h2>Ask Atlas anything about how we work.</h2>
              <p>Source-verified answers from your connected knowledge. Every claim is traced to a real document before you see it.</p>
              <div className="suggest">
                {SUGGESTIONS.map((s,i)=>(
                  <button key={i} onClick={()=>ask(s.t)}>{s.t}<span>{s.s}</span></button>
                ))}
              </div>
            </div>
          )}

          {messages.map(msg => msg.role === 'user' ? (
            <div className="msg user" key={msg.id}>
              <div className="bubble">{msg.text}</div>
            </div>
          ) : (
            <div className="msg fade-in" key={msg.id}>
              <div className="answer-head">
                <div className="brand-mark">A</div>
                <div className="nm">Atlas</div>
                <div className="status">
                  {msg.isStreaming
                    ? <><span className="dot" style={{background:'var(--accent)'}}></span>{msg.pipeSteps.length > 0 && msg.text === '' ? ' retrieving…' : ' generating…'}</>
                    : msg.kept ? <>{msg.kept} sources · {msg.latency}</> : ''}
                </div>
              </div>
              {msg.error && (
                <div style={{color:'var(--rose)', fontSize:13, padding:'10px', background:'var(--rose-t)', borderRadius:'var(--r)', marginBottom:8}}>
                  {msg.error}
                </div>
              )}
              <div className="answer-body">
                {msg.text.split('\n\n').filter(Boolean).map((p,i) => (
                  <p key={i}><Citations text={p} onHot={setHot} /></p>
                ))}
                {msg.isStreaming && <span style={{opacity:.4}}>▍</span>}
              </div>
              {!msg.isStreaming && !msg.error && msg.text && (
                <div className="answer-actions fade-in">
                  <button className="ico-btn" title="Copy" onClick={()=>navigator.clipboard.writeText(msg.text)}>⧉</button>
                  {msg.ground != null && <span style={{marginLeft:8, fontFamily:'var(--mono)', fontSize:10.5, color:'var(--ink-4)'}}>source-verified {Math.round(msg.ground*100)}%</span>}
                </div>
              )}
            </div>
          ))}
        </div>

        <form className="composer" onSubmit={submitFree}>
          <div className="composer-inner">
            <span style={{color:'var(--ink-4)', fontSize:16}}>⌕</span>
            <input value={input} onChange={e=>setInput(e.target.value)}
              placeholder={messages.length === 0 ? 'Ask anything, or try a suggestion above…' : 'Ask a follow-up…'} />
            <button className="send" type="submit" disabled={isStreaming}>↑</button>
          </div>
        </form>
      </div>

      {/* RIGHT inspector — always shows latest answer trace */}
      <div className="insp pane">
        <div className="insp-h">
          <div className="t">Retrieval</div>
          {latestAssistant && <span className="chip accent">{latestAssistant.isStreaming ? 'live' : 'trace'}</span>}
        </div>
        <div className="insp-sub">How this answer was built — the part interviewers actually want to see.</div>

        {!latestAssistant && <div style={{color:'var(--ink-4)', fontSize:12.5, marginTop:30, textAlign:'center', lineHeight:1.5}}>Ask a question to see the live retrieval &amp; source verification trace.</div>}

        {latestAssistant && (
          <>
            <div style={{marginBottom:18}}>
              {(latestAssistant.isStreaming ? latestAssistant.pipeSteps : (latestAssistant.pipeSteps.length ? latestAssistant.pipeSteps : PIPE)).map((p,i)=>(
                <div className="pipe-step" key={i}>
                  <div className={'pipe-dot' + (!latestAssistant.isStreaming ? ' done' : i < latestAssistant.pipeSteps.length ? ' done' : '')}>
                    {(!latestAssistant.isStreaming || i < latestAssistant.pipeSteps.length) && <span style={{color:'#fff', fontSize:10}}>✓</span>}
                  </div>
                  <div><div className="pt">{p.t}</div><div className="pd">{p.d}</div></div>
                </div>
              ))}
            </div>

            {!latestAssistant.isStreaming && latestAssistant.ground != null && (
              <div className="fade-in">
                <div className="ground">
                  <div className="gt"><span>Source Verified</span><span>{Math.round(latestAssistant.ground*100)}%</span></div>
                  <div className="bar"><i style={{width:(latestAssistant.ground*100)+'%'}}></i></div>
                  <div className="gn">Every claim is traced to a real document. Below 75% Atlas tells you it cannot find a reliable answer rather than guess.</div>
                </div>

                <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', margin:'2px 0 10px'}}>
                  <div style={{fontWeight:700, fontSize:12.5}}>Sources used</div>
                  <span style={{fontFamily:'var(--mono)', fontSize:10.5, color:'var(--ink-3)'}}>{latestAssistant.retrieved} retrieved → {latestAssistant.kept} kept</span>
                </div>
                {latestAssistant.sources.map(s=>(
                  <div className={'chunk'+(hot===s.id?' hot':'')} key={s.id}
                       onMouseEnter={()=>setHot(s.id)} onMouseLeave={()=>setHot(null)}>
                    <div className="chunk-h">
                      <div className="n">{s.id}</div>
                      <div><div className="ti">{s.title}</div></div>
                    </div>
                    <div className="chunk-x">{s.snippet}</div>
                    <div className="chunk-meta"><span className="chip">{s.space}</span></div>
                  </div>
                ))}
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

/* ---------------- architecture view ---------------- */
function ArrowRight() {
  return <div className="arrow"><svg viewBox="0 0 42 20"><line x1="0" y1="10" x2="34" y2="10" stroke="currentColor" strokeWidth="1.5"/><path d="M34 5 L41 10 L34 15" fill="none" stroke="currentColor" strokeWidth="1.5"/></svg></div>;
}
function Node({ title, sub, tags, cls='' }) {
  return (
    <div className={'node '+cls}>
      <div className="node-title">{title}</div>
      <div className="node-sub">{sub}</div>
      {tags && <div className="node-tag">{tags.map((t,i)=><span key={i}>{t}</span>)}</div>}
    </div>
  );
}
function Architecture() {
  return (
    <div className="arch-wrap arch-canvas">
      <div className="arch-inner">
        <div className="arch-title">Atlas — system architecture</div>
        <p className="arch-desc">Two paths: an offline <strong>ingestion</strong> pipeline that keeps the index fresh, and an online <strong>query</strong> path that retrieves, source-verifies and cites. Everything emits traces to the Lens platform.</p>

        <div className="lane">
          <div className="lane-label">Ingestion · offline / scheduled</div>
          <div className="flow">
            <Node title="① Connectors" sub="Pull from source systems on a schedule + webhooks for deltas." tags={['Confluence','Drive','Jira','S3 / PDF']} />
            <ArrowRight/>
            <Node title="② Parse & chunk" sub="Layout-aware parsing, semantic chunking with overlap, metadata tagging." tags={['unstructured','tiktoken','ACL tags']} />
            <ArrowRight/>
            <Node title="③ Embed" sub="Batch embeddings, self-hosted for cost + data control." tags={['bge / e5','vLLM batch']} />
            <ArrowRight/>
            <Node title="④ Vector store" sub="Hybrid index: dense vectors + sparse BM25, with row-level ACLs." tags={['pgvector','Qdrant','metadata filter']} cls="accent" />
          </div>
        </div>

        <div className="lane">
          <div className="lane-label">Query · online / per request</div>
          <div className="flow">
            <Node title="⑤ API gateway" sub="Auth, tenant + ACL context, rate limit, request trace id." tags={['FastAPI','OAuth','per-tenant']} />
            <ArrowRight/>
            <Node title="⑥ Orchestrator" sub="Query rewrite → hybrid retrieve → rerank → assemble cited context." tags={['LangGraph','semantic cache']} cls="accent" />
            <ArrowRight/>
            <Node title="⑦ Generation" sub="Streaming answer constrained to cite retrieved passages only." tags={['vLLM','Llama / Mistral','structured cites']} />
            <ArrowRight/>
            <Node title="⑧ Guardrails" sub="Source-Verified + PII + ACL check before the user sees a token." tags={['NeMo Guardrails','refuse < 0.8']} cls="accent" />
          </div>
        </div>

        <div className="lane">
          <div className="lane-label">Platform · cross-cutting</div>
          <div className="flow">
            <Node title="Evaluation" sub="Offline RAGAS suite in CI + online sampling of live answers." tags={['RAGAS','faithfulness','golden set']} cls="ghost" />
            <ArrowRight/>
            <Node title="Observability" sub="Every step traced: retrieval scores, tokens, latency, cost." tags={['OpenTelemetry','→ Lens']} cls="ghost" />
            <ArrowRight/>
            <Node title="Feedback loop" sub="👍/👎 + cited-source clicks feed hard-negative mining & reranker tuning." tags={['label store','retrain']} cls="ghost" />
            <ArrowRight/>
            <Node title="CI / CD" sub="Eval-gated deploys; index migrations are versioned & reversible." tags={['GitHub Actions','blue/green']} cls="ghost" />
          </div>
        </div>

        <div className="legend">
          <div><span className="dot" style={{background:'var(--accent)'}}></span> Core RAG path</div>
          <div><span className="dot" style={{background:'var(--border-2)', border:'1px dashed var(--ink-4)'}}></span> Platform / shared with Lens</div>
          <div style={{marginLeft:'auto', fontFamily:'var(--mono)', fontSize:11, color:'var(--ink-4)'}}>talk-track: framing → retrieval quality → source-verification → eval loop</div>
        </div>
      </div>
    </div>
  );
}

/* ---------------- shell ---------------- */
function App() {
  const [view, setView] = useState('product');
  return (
    <div className="proto-root">
      <div className="topbar">
        <div className="brand-mark">A</div>
        <div>
          <div className="brand-name">Atlas</div>
          <div className="brand-sub">Enterprise knowledge assistant</div>
        </div>
        <div style={{flex:1}}></div>
        <div className="seg">
          <button className={view==='product'?'active':''} onClick={()=>setView('product')}>Product</button>
          <button className={view==='arch'?'active':''} onClick={()=>setView('arch')}>Architecture</button>
        </div>
        <div style={{flex:1}}></div>
        <a href="index.html" className="btn btn-ghost" style={{textDecoration:'none'}}>← Portfolio</a>
        <span className="chip blue">Project 01</span>
      </div>
      {view==='product' ? <Product/> : <Architecture/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
